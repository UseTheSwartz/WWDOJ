<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worldwide Day of Josh</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a0a1a;
      overflow: hidden;
    }
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
      cursor: pointer;
    }
    canvas.fx {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      display: block;
    }
    .content {
      position: relative;
      z-index: 10;
      pointer-events: none;
    }
    .title {
      font-size: clamp(32px, 7vw, 64px);
      font-weight: 500;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 0.6rem;
      font-family: Arial, sans-serif;
      text-shadow: 0 0 40px rgba(200,160,255,0.5);
    }
    .dateline {
      font-size: clamp(16px, 3vw, 26px);
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.4rem;
      font-family: Arial, sans-serif;
    }
    .tagline {
      font-size: clamp(12px, 2vw, 16px);
      color: rgba(255,255,255,0.45);
      font-family: Arial, sans-serif;
    }
    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      margin-top: 1.5rem;
      letter-spacing: 0.06em;
      font-family: Arial, sans-serif;
    }
    .footer-line {
      font-size: 11px;
      color: rgba(255,255,255,0.15);
      margin-top: 1.25rem;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <canvas class="fx" id="c"></canvas>
    <div class="content">
      <div class="title">Worldwide Day<br>of Josh</div>
      <div class="dateline" id="dateline"></div>
      <div class="tagline">Have fun and celebrate with a Josh you know!</div>
      <div class="hint">tap anywhere for fireworks</div>
      <div class="footer-line">&copy; Josh Voting Block &mdash; All Rights Reserved</div>
    </div>
  </div>

  <script>
    const scene = document.getElementById('scene');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const d = new Date();
    document.getElementById('dateline').textContent =
      (() => { const months = ["January","February","March","April","May","June","July","August","September","October","November","December"]; const day = d.getDate(); const suffix = day === 1 || day === 21 || day === 31 ? "st" : day === 2 || day === 22 ? "nd" : day === 3 || day === 23 ? "rd" : "th"; return months[d.getMonth()] + " " + day + suffix + ", " + d.getFullYear() + " is the Worldwide Day of Josh!"; })();

    const COLORS = [
      '#ff6b9d','#c084fc','#60a5fa','#34d399','#fbbf24',
      '#f97316','#e879f9','#a78bfa','#38bdf8','#4ade80',
      '#facc15','#fb7185'
    ];

    const particles = [];
    const balloons = [];
    const stars = [];
    const rockets = [];

    function rnd(a, b) { return a + Math.random() * (b - a); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      stars.length = 0;
      for (let i = 0; i < 80; i++) spawnStar();
    }

    function spawnStar() {
      stars.push({
        x: rnd(0, canvas.width),
        y: rnd(0, canvas.height),
        r: rnd(0.8, 2.2),
        alpha: rnd(0.2, 0.75),
        t: rnd(0, Math.PI * 2),
        ts: rnd(0.008, 0.035)
      });
    }

    function spawnBurst(x, y, count) {
      count = count || 65;
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + rnd(-0.3, 0.3);
        const speed = rnd(2, 9);
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - rnd(0, 3),
          color: pick(COLORS),
          type: Math.random() < 0.5 ? 'rect' : 'circle',
          w: rnd(4, 10), h: rnd(4, 7),
          rot: rnd(0, Math.PI * 2),
          rotV: rnd(-0.2, 0.2),
          life: 1,
          decay: rnd(0.010, 0.018),
          gravity: 0.18
        });
      }
    }

    function launchRocket() {
      const targetX = rnd(canvas.width * 0.15, canvas.width * 0.85);
      const targetY = rnd(60, canvas.height * 0.42);
      const startX = rnd(canvas.width * 0.2, canvas.width * 0.8);
      rockets.push({
        x: startX, y: canvas.height + 10,
        targetX, targetY,
        color: pick(COLORS),
        trail: [],
        done: false,
        speed: 4.5
      });
    }

    function spawnBalloon() {
      balloons.push({
        x: rnd(60, canvas.width - 60),
        y: canvas.height + rnd(40, 120),
        vy: rnd(0.6, 1.3),
        vx: rnd(-0.35, 0.35),
        wobble: rnd(0, Math.PI * 2),
        wobbleSpeed: rnd(0.018, 0.045),
        r: rnd(18, 30),
        color: pick(COLORS),
        stringLen: rnd(40, 70)
      });
    }

    function drawBalloon(b) {
      const wx = Math.sin(b.wobble) * 4;
      const bx = b.x + wx;
      const by = b.y;

      // balloon body
      ctx.beginPath();
      ctx.ellipse(bx, by, b.r, b.r * 1.25, 0, 0, Math.PI * 2);
      ctx.fillStyle = b.color;
      ctx.fill();

      // shine
      ctx.beginPath();
      ctx.ellipse(bx - b.r * 0.28, by - b.r * 0.3, b.r * 0.2, b.r * 0.3, -0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.22)';
      ctx.fill();

      // knot
      ctx.beginPath();
      ctx.arc(bx, by + b.r * 1.25, 3, 0, Math.PI * 2);
      ctx.fillStyle = b.color;
      ctx.fill();

      // string — drawn as short segments with slight curve so it stays close
      const knotX = bx;
      const knotY = by + b.r * 1.25 + 3;
      const endX = bx + Math.sin(b.wobble * 0.5) * 6;
      const endY = knotY + b.stringLen;
      const cpX = (knotX + endX) / 2 + Math.sin(b.wobble) * 5;
      const cpY = (knotY + endY) / 2;

      ctx.beginPath();
      ctx.moveTo(knotX, knotY);
      ctx.quadraticCurveTo(cpX, cpY, endX, endY);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 6; i++) spawnBalloon();

    let lastRocket = -9999;
    let lastBalloon = -9999;

    scene.addEventListener('click', function(e) {
      spawnBurst(e.clientX, e.clientY, 80);
    });

    function loop(ts) {
      requestAnimationFrame(loop);

      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // stars
      for (const s of stars) {
        s.t += s.ts;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + (s.alpha * (0.5 + 0.5 * Math.sin(s.t))).toFixed(2) + ')';
        ctx.fill();
      }

      // rockets
      if (ts - lastRocket > 1100) { launchRocket(); lastRocket = ts; }

      for (let i = rockets.length - 1; i >= 0; i--) {
        const r = rockets[i];
        if (r.done) { rockets.splice(i, 1); continue; }

        const dx = r.targetX - r.x;
        const dy = r.targetY - r.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < r.speed + 1) {
          spawnBurst(r.targetX, r.targetY, 70);
          r.done = true;
          continue;
        }

        r.x += (dx / dist) * r.speed;
        r.y += (dy / dist) * r.speed;
        r.trail.push({ x: r.x, y: r.y });
        if (r.trail.length > 22) r.trail.shift();

        for (let t = 0; t < r.trail.length; t++) {
          const frac = t / r.trail.length;
          const tp = r.trail[t];
          ctx.beginPath();
          ctx.arc(tp.x, tp.y, frac * 2.5, 0, Math.PI * 2);
          const alpha = Math.floor(frac * 220).toString(16).padStart(2, '0');
          ctx.fillStyle = r.color + alpha;
          ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(r.x, r.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }

      // confetti particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.985;
        p.rot += p.rotV;
        p.life -= p.decay;
        if (p.life <= 0) { particles.splice(i, 1); continue; }
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.type === 'rect') ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        else { ctx.beginPath(); ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2); ctx.fill(); }
        ctx.restore();
      }

      // balloons
      if (ts - lastBalloon > 2000) { spawnBalloon(); lastBalloon = ts; }

      for (let i = balloons.length - 1; i >= 0; i--) {
        const b = balloons[i];
        b.y -= b.vy;
        b.x += b.vx;
        b.wobble += b.wobbleSpeed;
        if (b.y < -150) { balloons.splice(i, 1); continue; }
        drawBalloon(b);
      }
    }

    requestAnimationFrame(loop);

    setTimeout(function() {
      for (let i = 0; i < 4; i++) setTimeout(launchRocket, i * 350);
    }, 200);
  </script>
</body>
</html>
